<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FutureYou — NPS Crossword</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root {
  --orange:#F26522; --navy:#1A3A5C; --mid:#2E5F8A;
  --bg:#F4F6F9; --surface:#fff; --border:#E2E8F0;
  --text:#1A3A5C; --muted:#64829A;
  --cell:44px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;}
.topbar-left{display:flex;align-items:center;gap:16px;}
.back-link{font-size:13px;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:4px;}
.back-link:hover{color:var(--navy);}
.topbar-title{font-family:'Instrument Serif',serif;font-size:18px;}
.variant-btns{display:flex;gap:8px;}
.variant-btn{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--muted);cursor:pointer;transition:all 0.15s;}
.variant-btn.active{background:var(--navy);color:white;border-color:var(--navy);}

.layout{display:flex;gap:24px;padding:24px;align-items:flex-start;max-width:1100px;margin:0 auto;}

/* Grid */
.grid-wrap{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;flex-shrink:0;}
.grid-title{font-size:13px;font-weight:500;letter-spacing:0.07em;text-transform:uppercase;color:var(--muted);margin-bottom:16px;}
.cw-grid{display:inline-grid;gap:3px;border:2px solid var(--navy);border-radius:4px;padding:3px;}
.cw-row{display:flex;gap:3px;}
.cw-cell{
  width:var(--cell);height:var(--cell);
  border-radius:3px;
  position:relative;display:flex;align-items:center;justify-content:center;
}
.cw-cell.black{background:var(--navy);}
.cw-cell.white{background:#fff;border:1px solid var(--border);}
.cw-cell.active{background:#FEF3C7;border-color:var(--orange);}
.cw-cell.correct{background:#DCFCE7;border-color:#16A34A;}
.cw-cell.wrong{background:#FEE2E2;border-color:#DC2626;}
.cw-cell.highlight{background:#EFF6FF;border-color:#93C5FD;}

.cell-num{position:absolute;top:2px;left:3px;font-size:9px;font-weight:600;color:var(--muted);line-height:1;}
.cell-input{
  width:100%;height:100%;border:none;outline:none;background:transparent;
  text-align:center;font-family:'DM Sans',sans-serif;font-size:18px;font-weight:600;
  color:var(--navy);text-transform:uppercase;cursor:pointer;caret-color:transparent;
}
.cell-input:focus{outline:none;}

/* Clues */
.clues-wrap{flex:1;display:flex;flex-direction:column;gap:16px;}
.clues-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;}
.clues-heading{font-size:14px;font-weight:600;color:var(--navy);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.dir-badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500;}
.across-badge{background:#FEF3C7;color:#B45309;}
.down-badge{background:#EDE9FE;color:#6D28D9;}
.clue-row{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer;border-radius:6px;transition:background 0.1s;padding:8px 6px;}
.clue-row:last-child{border-bottom:none;}
.clue-row:hover{background:var(--bg);}
.clue-row.active-clue{background:#FFF7ED;}
.clue-num{font-size:13px;font-weight:600;color:var(--orange);min-width:24px;}
.clue-text{font-size:13px;color:var(--text);line-height:1.4;}

/* Controls */
.controls{display:flex;gap:10px;margin-top:8px;}
.btn{padding:10px 20px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.15s;border:none;}
.btn-primary{background:var(--orange);color:white;}
.btn-primary:hover{background:#D4541A;}
.btn-secondary{background:var(--bg);border:1px solid var(--border);color:var(--text);}
.btn-secondary:hover{border-color:var(--navy);color:var(--navy);}

.result-banner{display:none;background:var(--navy);color:white;border-radius:12px;padding:16px 20px;text-align:center;font-size:15px;margin-top:8px;}
.result-banner.show{display:block;}
.result-banner.correct-all{background:#15803D;}

.progress-row{display:flex;align-items:center;gap:12px;margin-top:4px;}
.prog-label{font-size:12px;color:var(--muted);}
.prog-track{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:var(--orange);border-radius:3px;transition:width 0.3s;}
.prog-count{font-size:12px;font-weight:500;color:var(--navy);}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a class="back-link" href="futureyou_games.html">&#8592; Games</a>
    <div class="topbar-title">NPS Crossword</div>
  </div>
  <div class="variant-btns">
    <button class="variant-btn active" onclick="loadVariant(0)">Puzzle 1</button>
    <button class="variant-btn" onclick="loadVariant(1)">Puzzle 2</button>
  </div>
</div>

<div class="layout">
  <div class="grid-wrap">
    <div class="grid-title">Fill in the grid</div>
    <div id="cw-grid" class="cw-grid"></div>
    <div class="progress-row">
      <span class="prog-label">Progress</span>
      <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
      <span class="prog-count" id="prog-count">0 / 0</span>
    </div>
    <div class="controls" style="margin-top:12px;">
      <button class="btn btn-primary" onclick="checkAll()">Check answers</button>
      <button class="btn btn-secondary" onclick="revealAll()">Reveal</button>
      <button class="btn btn-secondary" onclick="resetGrid()">Reset</button>
    </div>
    <div class="result-banner" id="result-banner"></div>
  </div>

  <div class="clues-wrap">
    <div class="clues-card">
      <div class="clues-heading">Across <span class="dir-badge across-badge">&#8594;</span></div>
      <div id="clues-across"></div>
    </div>
    <div class="clues-card">
      <div class="clues-heading">Down <span class="dir-badge down-badge">&#8595;</span></div>
      <div id="clues-down"></div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════
// PUZZLE DATA
// Each puzzle: { size, black cells as [row,col], words[] }
// word: { num, answer, dir:'A'|'D', row, col, clue }
// ══════════════════════════════════════════════════════════════
const PUZZLES = [
  {
    label: 'Puzzle 1',
    size: 9,
    blacks: [
      [0,4],[0,5],[0,6],[0,7],[0,8],
      [1,4],
      [2,7],[2,8],
      [3,0],[3,1],
      [4,0],[4,1],[4,7],[4,8],
      [5,7],[5,8],
      [6,0],[6,1],
      [7,4],
      [8,0],[8,1],[8,2],[8,3],[8,4],
    ],
    words: [
      { num:1,  dir:'A', row:0, col:0, answer:'PRAN',    clue:'Permanent Retirement Account Number issued to every NPS subscriber' },
      { num:4,  dir:'A', row:1, col:0, answer:'TIER',    clue:'NPS has Tier I and Tier __ accounts' },
      { num:5,  dir:'A', row:2, col:0, answer:'EQUITY',  clue:'NPS asset class E — invests in stocks' },
      { num:7,  dir:'A', row:3, col:2, answer:'PFRDA',   clue:'Regulator that governs NPS (abbr.)' },
      { num:9,  dir:'A', row:5, col:0, answer:'CORPUS',  clue:'The accumulated retirement fund is called your __' },
      { num:10, dir:'A', row:6, col:2, answer:'ANNUITY', clue:'You must use 40% of corpus to buy this at retirement' },
      { num:12, dir:'A', row:7, col:0, answer:'DEBT',    clue:'NPS asset class C invests in corporate __' },
      { num:1,  dir:'D', row:0, col:0, answer:'PFRDA',   clue:'Pension Fund Regulatory and Development Authority' },
      { num:2,  dir:'D', row:0, col:1, answer:'RETIRE',  clue:'The goal of NPS — to __ with dignity' },
      { num:3,  dir:'D', row:0, col:2, answer:'ANNUITY', clue:'Post-retirement income product bought with 40% of corpus' },
      { num:6,  dir:'D', row:1, col:5, answer:'EQUITY',  clue:'Asset class E in NPS — highest risk, highest return potential' },
      { num:8,  dir:'D', row:2, col:3, answer:'CORPUS',  clue:'Accumulated fund built over years of contributions' },
      { num:11, dir:'D', row:3, col:6, answer:'TIER',    clue:'NPS account type — I is locked, II is flexible' },
    ],
  },
  {
    label: 'Puzzle 2',
    size: 9,
    blacks: [
      [0,5],[0,6],[0,7],[0,8],
      [1,0],[1,5],
      [2,0],[2,5],
      [3,5],[3,6],[3,7],[3,8],
      [4,3],[4,4],
      [5,0],[5,1],[5,2],[5,3],
      [6,3],
      [7,3],[7,8],
      [8,3],[8,4],[8,5],[8,6],[8,7],[8,8],
    ],
    words: [
      { num:1,  dir:'A', row:0, col:0, answer:'NSDL',   clue:'CRA that maintains NPS accounts (abbr.)' },
      { num:3,  dir:'A', row:1, col:1, answer:'LOCK',   clue:'Tier I contributions have a __ until age 60' },
      { num:5,  dir:'A', row:2, col:1, answer:'EIGHTY', clue:'Section __ C gives ₹1.5L deduction' },
      { num:6,  dir:'A', row:3, col:0, answer:'FUND',   clue:'NPS money is managed by a __ manager' },
      { num:8,  dir:'A', row:4, col:0, answer:'TAX',    clue:'NPS is famous for its __ saving benefits' },
      { num:9,  dir:'A', row:5, col:4, answer:'FIFTY',  clue:'80CCD(1B) gives extra ₹__ thousand deduction' },
      { num:10, dir:'A', row:6, col:0, answer:'SIXTY',  clue:'At age __ you can exit NPS normally' },
      { num:11, dir:'A', row:7, col:0, answer:'CRA',    clue:'Central Recordkeeping Agency that maintains NPS accounts' },
      { num:12, dir:'A', row:7, col:4, answer:'INDIA',  clue:'NPS is a scheme for citizens of __' },
      { num:1,  dir:'D', row:0, col:0, answer:'NLFUND', clue:'NPS fund type — National Life __' },
      { num:2,  dir:'D', row:0, col:1, answer:'SLOCK',  clue:'Starts: Security __ in NPS Tier I' },
      { num:4,  dir:'D', row:1, col:2, answer:'OCTAX',  clue:'Placeholder down' },
      { num:7,  dir:'D', row:0, col:2, answer:'DEMAT',  clue:'NPS units are held in __ form electronically' },
      { num:13, dir:'D', row:0, col:3, answer:'SIXTY',  clue:'Normal NPS exit age — __ years' },
      { num:14, dir:'D', row:0, col:4, answer:'FIFTY',  clue:'Extra 80CCD(1B) deduction of ₹__ thousand' },
      { num:15, dir:'D', row:4, col:5, answer:'INDIA',  clue:'Regulator PFRDA is an authority of __' },
      { num:16, dir:'D', row:4, col:6, answer:'ANNUI',  clue:'First 5 letters of the product bought with 40% corpus' },
      { num:17, dir:'D', row:5, col:7, answer:'DEBT',   clue:'Asset class G invests in government __ securities' },
      { num:18, dir:'D', row:5, col:8, answer:'EXIT',   clue:'Premature __ from NPS requires 80% annuitisation' },
    ],
  },
];

// ── State ──────────────────────────────────────────────────────
let currentPuzzle = 0;
let grid = [];          // 2D array of cell objects
let selectedCell = null;
let selectedDir = 'A';
let cellEls = {};       // key: "r,c" → td element

function loadVariant(idx) {
  currentPuzzle = idx;
  document.querySelectorAll('.variant-btn').forEach((b,i) => b.classList.toggle('active', i === idx));
  buildGrid();
}

function buildGrid() {
  const p = PUZZLES[currentPuzzle];
  const container = document.getElementById('cw-grid');
  container.style.gridTemplateColumns = `repeat(${p.size}, var(--cell))`;
  container.innerHTML = '';
  cellEls = {};
  grid = [];

  // Mark blacks
  const blackSet = new Set(p.blacks.map(([r,c]) => `${r},${c}`));

  // Assign numbers
  const numMap = {};
  p.words.forEach(w => { numMap[`${w.row},${w.col}`] = w.num; });

  for (let r = 0; r < p.size; r++) {
    grid[r] = [];
    for (let c = 0; c < p.size; c++) {
      const key = `${r},${c}`;
      const isBlack = blackSet.has(key);
      grid[r][c] = { r, c, black: isBlack, value: '', answer: '' };

      const cell = document.createElement('div');
      cell.className = 'cw-cell ' + (isBlack ? 'black' : 'white');
      cell.dataset.r = r; cell.dataset.c = c;

      if (!isBlack) {
        if (numMap[key] !== undefined) {
          const num = document.createElement('div');
          num.className = 'cell-num';
          num.textContent = numMap[key];
          cell.appendChild(num);
        }
        const inp = document.createElement('input');
        inp.className = 'cell-input';
        inp.maxLength = 1;
        inp.dataset.r = r; inp.dataset.c = c;
        inp.addEventListener('focus', () => selectCell(r, c));
        inp.addEventListener('keydown', (e) => handleKey(e, r, c));
        inp.addEventListener('input', (e) => handleInput(e, r, c));
        cell.appendChild(inp);
        cellEls[key] = cell;
      }

      container.appendChild(cell);
    }
  }

  // Fill answer chars into grid
  p.words.forEach(w => {
    for (let i = 0; i < w.answer.length; i++) {
      const r = w.dir === 'A' ? w.row : w.row + i;
      const c = w.dir === 'A' ? w.col + i : w.col;
      if (grid[r] && grid[r][c]) grid[r][c].answer = w.answer[i];
    }
  });

  renderClues();
  updateProgress();
}

function renderClues() {
  const p = PUZZLES[currentPuzzle];
  const acrossDiv = document.getElementById('clues-across');
  const downDiv   = document.getElementById('clues-down');
  acrossDiv.innerHTML = '';
  downDiv.innerHTML   = '';

  const across = p.words.filter(w => w.dir === 'A').sort((a,b) => a.num - b.num);
  const down   = p.words.filter(w => w.dir === 'D').sort((a,b) => a.num - b.num);

  across.forEach(w => acrossDiv.appendChild(makeClueRow(w)));
  down.forEach(w   => downDiv.appendChild(makeClueRow(w)));
}

function makeClueRow(w) {
  const row = document.createElement('div');
  row.className = 'clue-row';
  row.id = `clue-${w.dir}-${w.num}`;
  row.innerHTML = `<span class="clue-num">${w.num}</span><span class="clue-text">${w.clue}</span>`;
  row.onclick = () => { selectedDir = w.dir; selectCell(w.row, w.col); };
  return row;
}

function selectCell(r, c) {
  if (grid[r]?.[c]?.black) return;
  selectedCell = { r, c };
  highlightWord(r, c, selectedDir);
  const inp = cellEls[`${r},${c}`]?.querySelector('.cell-input');
  if (inp) inp.focus();
  updateActiveClue();
}

function highlightWord(r, c, dir) {
  // Clear all highlights
  Object.values(cellEls).forEach(el => { el.classList.remove('active','highlight'); });
  document.querySelectorAll('.clue-row').forEach(el => el.classList.remove('active-clue'));

  const p = PUZZLES[currentPuzzle];
  const word = findWord(r, c, dir) || findWord(r, c, dir === 'A' ? 'D' : 'A');
  if (!word) return;

  selectedDir = word.dir;
  for (let i = 0; i < word.answer.length; i++) {
    const wr = word.dir === 'A' ? word.row : word.row + i;
    const wc = word.dir === 'A' ? word.col + i : word.col;
    const el = cellEls[`${wr},${wc}`];
    if (el) el.classList.add(wr === r && wc === c ? 'active' : 'highlight');
  }
}

function findWord(r, c, dir) {
  const p = PUZZLES[currentPuzzle];
  return p.words.find(w => {
    if (w.dir !== dir) return false;
    for (let i = 0; i < w.answer.length; i++) {
      const wr = w.dir === 'A' ? w.row : w.row + i;
      const wc = w.dir === 'A' ? w.col + i : w.col;
      if (wr === r && wc === c) return true;
    }
    return false;
  });
}

function updateActiveClue() {
  document.querySelectorAll('.clue-row').forEach(el => el.classList.remove('active-clue'));
  if (!selectedCell) return;
  const word = findWord(selectedCell.r, selectedCell.c, selectedDir);
  if (word) {
    const el = document.getElementById(`clue-${word.dir}-${word.num}`);
    if (el) { el.classList.add('active-clue'); el.scrollIntoView({ block:'nearest' }); }
  }
}

function handleKey(e, r, c) {
  if (e.key === 'Tab') { e.preventDefault(); selectedDir = selectedDir === 'A' ? 'D' : 'A'; selectCell(r, c); return; }
  if (e.key === 'ArrowRight') { e.preventDefault(); moveNext(r, c, 0, 1); }
  if (e.key === 'ArrowLeft')  { e.preventDefault(); moveNext(r, c, 0,-1); }
  if (e.key === 'ArrowDown')  { e.preventDefault(); moveNext(r, c, 1, 0); }
  if (e.key === 'ArrowUp')    { e.preventDefault(); moveNext(r, c,-1, 0); }
  if (e.key === 'Backspace') {
    const inp = cellEls[`${r},${c}`]?.querySelector('.cell-input');
    if (inp && !inp.value) {
      const word = findWord(r, c, selectedDir);
      if (word) {
        // Move to previous cell in word
        const cells = [];
        for (let i = 0; i < word.answer.length; i++) {
          cells.push({ r: word.dir==='A'?word.row:word.row+i, c: word.dir==='A'?word.col+i:word.col });
        }
        const pos = cells.findIndex(cl => cl.r===r && cl.c===c);
        if (pos > 0) selectCell(cells[pos-1].r, cells[pos-1].c);
      }
    }
  }
}

function handleInput(e, r, c) {
  const inp = cellEls[`${r},${c}`]?.querySelector('.cell-input');
  if (!inp) return;
  inp.value = inp.value.slice(-1).toUpperCase();
  grid[r][c].value = inp.value;
  updateProgress();
  if (inp.value) advanceInWord(r, c);
  // Clear check colours
  cellEls[`${r},${c}`]?.classList.remove('correct','wrong');
}

function advanceInWord(r, c) {
  const word = findWord(r, c, selectedDir);
  if (!word) return;
  const cells = [];
  for (let i = 0; i < word.answer.length; i++) {
    cells.push({ r: word.dir==='A'?word.row:word.row+i, c: word.dir==='A'?word.col+i:word.col });
  }
  const pos = cells.findIndex(cl => cl.r===r && cl.c===c);
  if (pos < cells.length - 1) selectCell(cells[pos+1].r, cells[pos+1].c);
}

function moveNext(r, c, dr, dc) {
  const nr = r+dr; const nc = c+dc;
  if (nr>=0 && nc>=0 && nr<PUZZLES[currentPuzzle].size && nc<PUZZLES[currentPuzzle].size && !grid[nr]?.[nc]?.black) {
    selectCell(nr, nc);
  }
}

function checkAll() {
  let correct = 0; let total = 0;
  for (let r = 0; r < grid.length; r++) {
    for (let c = 0; c < grid[r].length; c++) {
      const cell = grid[r][c];
      if (cell.black || !cell.answer) continue;
      total++;
      const el = cellEls[`${r},${c}`];
      const inp = el?.querySelector('.cell-input');
      if (!inp?.value) continue;
      if (inp.value.toUpperCase() === cell.answer) { el.classList.add('correct'); el.classList.remove('wrong'); correct++; }
      else { el.classList.add('wrong'); el.classList.remove('correct'); }
    }
  }
  const banner = document.getElementById('result-banner');
  if (correct === total) {
    banner.textContent = '🎉 Perfect! All answers correct. +50 XP earned!';
    banner.className = 'result-banner show correct-all';
  } else {
    banner.textContent = `${correct} of ${total} correct. Wrong cells highlighted in red.`;
    banner.className = 'result-banner show';
  }
}

function revealAll() {
  for (let r = 0; r < grid.length; r++) {
    for (let c = 0; c < grid[r].length; c++) {
      const cell = grid[r][c];
      if (cell.black || !cell.answer) continue;
      const inp = cellEls[`${r},${c}`]?.querySelector('.cell-input');
      if (inp) { inp.value = cell.answer; grid[r][c].value = cell.answer; }
    }
  }
  updateProgress();
}

function resetGrid() {
  for (let r = 0; r < grid.length; r++) {
    for (let c = 0; c < grid[r].length; c++) {
      grid[r][c].value = '';
      const inp = cellEls[`${r},${c}`]?.querySelector('.cell-input');
      if (inp) inp.value = '';
      cellEls[`${r},${c}`]?.classList.remove('correct','wrong');
    }
  }
  document.getElementById('result-banner').className = 'result-banner';
  updateProgress();
}

function updateProgress() {
  let filled = 0; let total = 0;
  for (let r = 0; r < grid.length; r++) {
    for (let c = 0; c < (grid[r]?.length||0); c++) {
      if (grid[r][c]?.black || !grid[r][c]?.answer) continue;
      total++;
      if (grid[r][c].value) filled++;
    }
  }
  const pct = total ? Math.round((filled/total)*100) : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-count').textContent = `${filled} / ${total}`;
}

loadVariant(0);
</script>
</body>
</html>
