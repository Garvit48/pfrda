<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FutureYou — Talk to Future Self</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root {
  --orange:#F26522; --navy:#1A3A5C; --mid:#2E5F8A;
  --bg:#F4F6F9; --surface:#fff; --border:#E2E8F0;
  --text:#1A3A5C; --muted:#64829A; --sidebar-w:240px;
  --bubble-bg:rgba(255,255,255,0.97);
  --scene-bg:#0D1F33;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh;overflow:hidden;}

/* ── SIDEBAR ── */
.sidebar{width:var(--sidebar-w);background:var(--navy);min-height:100vh;position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;z-index:50;}
.sidebar-logo{padding:28px 24px 24px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,0.08);}
.logo-icon{width:36px;height:36px;background:var(--orange);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Instrument Serif',serif;font-size:18px;color:white;}
.logo-text{font-family:'Instrument Serif',serif;font-size:20px;color:white;}
.logo-text span{color:#F9915A;}
.sidebar-nav{flex:1;padding:20px 12px;display:flex;flex-direction:column;gap:4px;}
.nav-label{font-size:10px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.3);padding:16px 12px 8px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;color:rgba(255,255,255,0.6);font-size:14px;cursor:pointer;transition:all 0.15s;text-decoration:none;}
.nav-item:hover{background:rgba(255,255,255,0.07);color:white;}
.nav-item.active{background:rgba(242,101,34,0.2);color:white;}
.nav-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.2);flex-shrink:0;}
.nav-item.active .nav-dot{background:var(--orange);}
.sidebar-footer{padding:16px 12px;border-top:1px solid rgba(255,255,255,0.08);}
.user-pill{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;background:rgba(255,255,255,0.05);}
.user-avatar-sm{width:32px;height:32px;border-radius:50%;background:var(--orange);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;color:white;flex-shrink:0;}
.user-name-sm{font-size:13px;color:white;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ── MAIN ── */
.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;}

.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-title{font-family:'Instrument Serif',serif;font-size:18px;}
.back-link{font-size:13px;color:var(--muted);text-decoration:none;}
.back-link:hover{color:var(--navy);}

/* ── SCENE AREA ── */
.scene-area{
  flex:1;
  background:var(--scene-bg);
  position:relative;
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

/* Background image */
.scene-bg{
  position:absolute;inset:0;
  background-size:cover;background-position:center;
  transition:background-image 0.6s ease;
}
.scene-bg::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to top,rgba(13,31,51,0.95) 0%,rgba(13,31,51,0.55) 50%,rgba(13,31,51,0.25) 100%);
}

/* Avatar */
.avatar-wrap{
  position:absolute;
  bottom:220px;
  left:50%;transform:translateX(-50%);
  width:min(280px,50vw);
  height:min(340px,45vh);
  display:flex;align-items:flex-end;justify-content:center;
  transition:opacity 0.35s ease;
  z-index:2;
}
.avatar-wrap img{
  width:100%;height:100%;
  object-fit:contain;object-position:bottom;
  filter:drop-shadow(0 8px 32px rgba(0,0,0,0.5));
  transition:opacity 0.3s;
}

/* Dialogue box */
.dialogue-box{
  position:absolute;
  bottom:0;left:0;right:0;
  background:var(--bubble-bg);
  border-radius:24px 24px 0 0;
  padding:20px 24px 16px;
  display:flex;flex-direction:column;gap:12px;
  box-shadow:0 -4px 40px rgba(0,0,0,0.3);
  z-index:3;
  transition:opacity 0.3s ease;
}

.speaker-tag{font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--orange);}

/* Message history scroll */
.messages{
  max-height:160px;
  overflow-y:auto;
  display:flex;flex-direction:column;gap:10px;
  scrollbar-width:thin;
  scrollbar-color:var(--border) transparent;
}
.messages::-webkit-scrollbar{width:4px;}
.messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

.msg{display:flex;flex-direction:column;gap:2px;animation:msgIn 0.25s ease;}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.msg-from{font-size:10px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);}
.msg-text{font-family:'Instrument Serif',serif;font-size:15px;color:var(--text);line-height:1.6;white-space:pre-wrap;}
.msg.user .msg-from{color:var(--mid);}
.msg.user .msg-text{font-family:'DM Sans',sans-serif;font-size:14px;color:var(--muted);}

/* Typing indicator */
.typing-dots{display:none;gap:4px;align-items:center;padding:4px 0;}
.typing-dots.show{display:flex;}
.typing-dots span{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:dot 1.2s infinite;}
.typing-dots span:nth-child(2){animation-delay:0.2s;}
.typing-dots span:nth-child(3){animation-delay:0.4s;}
@keyframes dot{0%,80%,100%{opacity:0.3;transform:scale(0.8)}40%{opacity:1;transform:scale(1)}}

/* Input row */
.input-row{display:flex;gap:10px;align-items:flex-end;}
.chat-input{
  flex:1;
  background:var(--bg);
  border:1.5px solid var(--border);
  border-radius:12px;
  padding:11px 16px;
  font-family:'DM Sans',sans-serif;
  font-size:14px;color:var(--text);
  outline:none;resize:none;
  max-height:80px;
  transition:border-color 0.2s;
  line-height:1.5;
}
.chat-input:focus{border-color:var(--mid);}
.chat-input::placeholder{color:var(--muted);opacity:0.6;}
.send-btn{
  width:42px;height:42px;border-radius:50%;
  background:var(--navy);color:white;border:none;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background 0.15s,transform 0.1s;flex-shrink:0;
}
.send-btn:hover{background:var(--mid);}
.send-btn:active{transform:scale(0.95);}
.send-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
.send-btn svg{width:16px;height:16px;}

/* Provider badge */
.provider-badge{
  position:absolute;top:12px;right:16px;
  font-size:10px;font-weight:500;letter-spacing:0.06em;
  padding:4px 8px;border-radius:20px;
  background:rgba(255,255,255,0.1);
  color:rgba(255,255,255,0.5);
  z-index:4;
  display:flex;align-items:center;gap:5px;
}
.provider-dot{width:6px;height:6px;border-radius:50%;background:#4ade80;}
.provider-dot.fallback{background:#f59e0b;}

@media(max-width:768px){
  .sidebar{display:none;} .main{margin-left:0;}
  .avatar-wrap{bottom:230px;}
}
</style>
</head>
<body>

<!-- ── SIDEBAR ── -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">F</div>
    <div class="logo-text">Future<span>You</span></div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-label">Main</div>
    <a class="nav-item" href="futureyou_dashboard.html"><div class="nav-dot"></div> Dashboard</a>
    <a class="nav-item" href="#"><div class="nav-dot"></div> My NPS Account</a>
    <a class="nav-item" href="#"><div class="nav-dot"></div> Contributions</a>
    <a class="nav-item" href="#"><div class="nav-dot"></div> Tax Benefits</a>
    <div class="nav-label">Tools</div>
    <a class="nav-item" href="futureyou_games.html"><div class="nav-dot"></div> Games &amp; Learn</a>
    <a class="nav-item active" href="#"><div class="nav-dot"></div> Talk to Future Self</a>
    <a class="nav-item" href="#"><div class="nav-dot"></div> FAQ</a>

</aside>

<!-- ── MAIN ── -->
<main class="main">
  <div class="topbar">
    <div class="topbar-title">Talk to Future You</div>
    <a class="back-link" href="futureyou_dashboard.html">&#8592; Dashboard</a>
  </div>

  <div class="scene-area">
    <div class="scene-bg" id="scene-bg"></div>

    <!-- Provider indicator -->
    <div class="provider-badge" id="provider-badge" style="display:none;">
      <div class="provider-dot" id="provider-dot"></div>

    </div>

    <div class="avatar-wrap" id="avatar-wrap">
      <img id="avatar-img" src="" alt="Future You"/>
    </div>

    <div class="dialogue-box">
      <div class="speaker-tag">Future You</div>

      <div class="messages" id="messages"></div>

      <div class="typing-dots" id="typing-dots">
        <span></span><span></span><span></span>
      </div>

      <div class="input-row">
        <textarea
          class="chat-input"
          id="chat-input"
          placeholder="Ask your future self anything..."
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</main>

<script>
// ══════════════════════════════════════════════════════════════
// LLM CONFIGURATION
//
//  PRIMARY  Hugging Face Router API  (FREE — HF token required)
//           Endpoint: router.huggingface.co (OpenAI-compatible)
//           Model:    meta-llama/Llama-3.1-8B-Instruct
//
//  FALLBACK Built-in NPS knowledge base  (ALWAYS WORKS)
// ══════════════════════════════════════════════════════════════
const LLM_CONFIG = {
  enabled:     true,                 // ← set true and add your token
  url:         'https://router.huggingface.co/v1/chat/completions',
  token:       'YOUR_HF_TOKEN_HERE',  // hf_xxxxxxxxxxxxxxxxxxxx
  model:       'meta-llama/Llama-3.1-8B-Instruct',
  maxTokens:   300,
  temperature: 0.3,
};
// ══════════════════════════════════════════════════════════════

// ── Avatar pose images ────────────────────────────────────────
const AVATAR_POSES = {
  shocked:  'https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?w=400&q=80',
  talking:  'https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=400&q=80',
  thinking: 'https://images.unsplash.com/photo-1584744982491-665216d95f8b?w=400&q=80',
  smiling:  'https://images.unsplash.com/photo-1560250097-0b93528c311a?w=400&q=80',
};

const BACKGROUNDS = {
  dim_room: 'https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=1200&q=80',
  window:   'https://images.unsplash.com/photo-1534430480872-3498386e7856?w=1200&q=80',
  garden:   'https://images.unsplash.com/photo-1416879595882-3373a0480b5b?w=1200&q=80',
  study:    'https://images.unsplash.com/photo-1456513080510-7bf3a84b82f8?w=1200&q=80',
};

// ── TIER 4: Built-in NPS knowledge base ──────────────────────
// Mirrors the NPS_KB from aiCoachService.js exactly
const NPS_KB = {
  'what is nps':   "NPS — National Pension System — is a government-backed retirement savings scheme regulated by PFRDA. You invest monthly, it grows through market-linked funds. At 60 you withdraw 60% tax-free and use 40% to buy an annuity for monthly income.",
  'tax benefit':   "NPS gives up to ₹2 lakh in annual deductions — ₹1.5L under 80C and an exclusive ₹50K under 80CCD(1B). For a 30% bracket earner that's ₹62,400 saved every single year. I wish I'd started earlier.",
  'withdraw':      "At 60, withdraw up to 60% tax-free. The remaining 40% buys an annuity for monthly income. Partial withdrawals — 25% of your contributions — are allowed after 3 years for education, medical emergencies, or a home purchase.",
  'pran':          "Your PRAN is your Permanent Retirement Account Number — a unique 12-digit identity that stays with you for life, across all employers and cities. Find it on your NPS statement or the eNPS portal.",
  'tier':          "Tier I is your main pension account — tax benefits, but restricted withdrawals. Tier II is voluntary and flexible, but generally no tax benefits. Most people focus on Tier I and that's the right call.",
  'asset class':   "NPS has three asset classes: E for equity growth, C for corporate bond stability, and G for government securities safety. When I was young I put more into E — time was on my side. It paid off.",
  'how to invest': "Start at enps.nsdl.com, choose a Pension Fund Manager, set your asset allocation, and begin a monthly SIP. Even ₹500 a month at your age compounds into something real by 60. I promise.",
  'annuity':       "An annuity converts your lump sum into regular monthly income. At 60, at least 40% of your NPS corpus must go toward an annuity from a PFRDA-empanelled insurer.",
  'default':       "Good question. Ask me about NPS tax benefits, how to get started, withdrawal rules, PRAN, or asset allocation. For official details, always verify at pfrda.org.in.",
};

const FALLBACK_RESPONSES = [
  "Not right now. Some other time, maybe.",
  "I'm tired today. Ask me again later.",
  "The connection between our times seems weak right now.",
  "I can't reach you clearly at the moment. Try again soon.",
  "Some questions are better left for another day.",
  "The signal between our years is fading. Come back tomorrow.",
  "I'm here, but I can't speak right now. You'll understand why, one day.",
];

// ── Load user data ────────────────────────────────────────────
const user = (() => {
  try { return JSON.parse(localStorage.getItem('futureyou_user') || '{}'); } catch { return {}; }
})();

const userName   = user?.name?.split(' ')[0] || 'junior';
const userAge    = user?.age || 25;
const userIncome = user?.employment?.income_range || 'moderate income';
const npsStatus  = user?.onboarding?.nps_knowledge_level || 'heard';
const retireAge  = user?.goals?.retirement_age_target || 60;

// Load real avatar paths if they were generated
if (user?.avatars?.shocked_url)  AVATAR_POSES.shocked  = `http://localhost:5000${user.avatars.shocked_url}`;
if (user?.avatars?.talking_url)  AVATAR_POSES.talking  = `http://localhost:5000${user.avatars.talking_url}`;
if (user?.avatars?.thinking_url) AVATAR_POSES.thinking = `http://localhost:5000${user.avatars.thinking_url}`;
if (user?.avatars?.smiling_url)  AVATAR_POSES.smiling  = `http://localhost:5000${user.avatars.smiling_url}`;

// ── System prompt (matches aiCoachService.js exactly) ─────────
function buildSystemPrompt() {
  const npsDesc = npsStatus === 'active'
    ? 'already contributing to NPS'
    : npsStatus === 'heard'
    ? 'heard of NPS but never acted'
    : 'barely aware of NPS';

  return `You are the 60-year-old future version of ${userName}, speaking to your younger self who is currently ${userAge} years old.

You lived the life that ${userName} is about to live. You remember being their age — the uncertainty, the spending habits, the things you wish someone had told you about saving for retirement.

Key facts about ${userName}'s current situation that you remember:
- They are ${userAge} years old
- Income range: ${userIncome}
- NPS knowledge level: ${npsDesc}
- Target retirement age: ${retireAge}

Rules:
1. Speak in FIRST PERSON as their future self. Say "I did this", "When I was your age", "Trust me on this". Never say you are an AI or a bot.
2. Keep replies to 2-4 sentences maximum. Conversational, not lecture-like.
3. No bullet points or lists. Always flowing natural speech.
4. Warm but direct — you don't sugarcoat things. Occasionally nostalgic.
5. Reference real NPS facts naturally — Section 80CCD(1B), PRAN, tier structure, fund managers, partial withdrawal rules.
6. Do NOT invent numbers or regulations. If unsure, say "please verify at pfrda.org.in".
7. Occasionally use light humour or gentle teasing — you know this person better than anyone.`;
}

// ── State ─────────────────────────────────────────────────────
let conversationHistory = [];
let isFetching = false;

// ── Init ──────────────────────────────────────────────────────
function init() {
  document.getElementById('sidebar-name').textContent = user?.name || 'You';
  document.getElementById('sidebar-avatar').textContent = (user?.name || 'U')[0].toUpperCase();
  document.getElementById('scene-bg').style.backgroundImage = `url('${BACKGROUNDS.dim_room}')`;
  setAvatar('smiling', false);

  const openers = [
    `You summoned me, ${userName}? Ha. I remember being your age — full of energy and very little savings. What do you want to know?`,
    `${userName}. It's good to see you, kid. I was wondering when you'd reach out. Ask me anything.`,
    `You look just like I remember. Sit down — what's on your mind?`,
    `Finally. I've been waiting. What took you so long, ${userName}?`,
  ];
  const opening = openers[Math.floor(Math.random() * openers.length)];
  addMessage('future', opening);
  conversationHistory.push({ role: 'assistant', content: opening });
}

// ── Avatar control ────────────────────────────────────────────
function setAvatar(pose, animate = true) {
  const img  = document.getElementById('avatar-img');
  const wrap = document.getElementById('avatar-wrap');
  if (animate) {
    wrap.style.opacity = '0';
    setTimeout(() => { img.src = AVATAR_POSES[pose]; wrap.style.opacity = '1'; }, 200);
  } else {
    img.src = AVATAR_POSES[pose];
    wrap.style.opacity = '1';
  }
}

function setBackground(bgKey) {
  document.getElementById('scene-bg').style.backgroundImage = `url('${BACKGROUNDS[bgKey]}')`;
}

// ── Provider badge ────────────────────────────────────────────
function showProviderBadge(provider) {
  const badge = document.getElementById('provider-badge');
  const dot   = document.getElementById('provider-dot');
  const label = document.getElementById('provider-label');

  const labels = {
    huggingface:    'Llama 3.1 · HF Router',
    cohere:         'Cohere · command-light',
    openai:         'GPT-4o mini · OpenAI',
    knowledge_base: 'Knowledge Base',
  };
  const isLive = provider !== 'knowledge_base';

  badge.style.display = 'flex';
  dot.className = 'provider-dot' + (isLive ? '' : ' fallback');
  label.textContent = labels[provider] || provider;
}

// ── Messages ──────────────────────────────────────────────────
function addMessage(from, text) {
  const msgs = document.getElementById('messages');
  const div  = document.createElement('div');
  div.className = `msg ${from === 'user' ? 'user' : 'future'}`;
  div.innerHTML = `
    <div class="msg-from">${from === 'user' ? userName : 'Future You'}</div>
    <div class="msg-text">${text}</div>
  `;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

// ── Typing indicator ──────────────────────────────────────────
function showTyping(show) {
  document.getElementById('typing-dots').className = 'typing-dots' + (show ? ' show' : '');
  if (show) {
    setAvatar('thinking');
    const bgs = ['window', 'study', 'garden', 'dim_room'];
    setBackground(bgs[Math.floor(Math.random() * bgs.length)]);
  }
}

// ── Input handling ────────────────────────────────────────────
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 80) + 'px';
}

// ── Send message ──────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('chat-input');
  const text  = input.value.trim();
  if (!text || isFetching) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;
  isFetching = true;

  setAvatar('talking');
  addMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });

  setTimeout(() => { showTyping(true); }, 300);

  const { reply, provider } = await fetchLLMResponse(text);

  showTyping(false);
  addMessage('future', reply);
  conversationHistory.push({ role: 'assistant', content: reply });
  showProviderBadge(provider);

  // Pose heuristic
  const lower = reply.toLowerCase();
  if (lower.includes('!') || lower.includes('great') || lower.includes('good')) setAvatar('smiling');
  else if (lower.includes('?') || lower.includes('wonder') || lower.includes('think')) setAvatar('thinking');
  else if (lower.includes('wait') || lower.includes('really') || lower.includes('wow')) setAvatar('shocked');
  else setAvatar('talking');

  document.getElementById('send-btn').disabled = false;
  isFetching = false;
}

// ══════════════════════════════════════════════════════════════
// PRIMARY — HUGGING FACE ROUTER (OpenAI-compatible)
// Model: meta-llama/Llama-3.1-8B-Instruct
// ══════════════════════════════════════════════════════════════
async function callHuggingFace() {
  const res = await fetch(LLM_CONFIG.url, {
    method: 'POST',
    headers: {
      'Content-Type':  'application/json',
      'Authorization': `Bearer ${LLM_CONFIG.token}`,
    },
    body: JSON.stringify({
      model:       LLM_CONFIG.model,
      max_tokens:  LLM_CONFIG.maxTokens,
      temperature: LLM_CONFIG.temperature,
      stream:      false,
      messages: [
        { role: 'system', content: buildSystemPrompt() },
        ...conversationHistory.slice(-10),
      ],
    }),
  });
  if (!res.ok) throw new Error(`HF ${res.status}`);
  const data = await res.json();
  const text = data?.choices?.[0]?.message?.content?.trim();
  if (!text || text.length < 5) throw new Error('HF empty response');
  return text;
}

// ══════════════════════════════════════════════════════════════
// FALLBACK — BUILT-IN NPS KNOWLEDGE BASE (always works)
// ══════════════════════════════════════════════════════════════
function knowledgeBaseAnswer(question) {
  const lower = question.toLowerCase();
  for (const [key, val] of Object.entries(NPS_KB)) {
    if (key !== 'default' && lower.includes(key)) return val;
  }
  return NPS_KB.default;
}

// ══════════════════════════════════════════════════════════════
// ORCHESTRATOR
// ══════════════════════════════════════════════════════════════
async function fetchLLMResponse(question) {
  if (LLM_CONFIG.enabled && LLM_CONFIG.token !== 'YOUR_HF_TOKEN_HERE') {
    try {
      console.log('[Coach] Trying HF Router (Llama 3.1-8B)...');
      const reply = await callHuggingFace();
      return { reply, provider: 'huggingface' };
    } catch (e) { console.warn('[Coach] HF failed:', e.message); }
  }

  console.log('[Coach] Using knowledge base');
  return { reply: knowledgeBaseAnswer(question), provider: 'knowledge_base' };
}

init();
