<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FutureYou — Two Truths, One Lie</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root {
  --orange:#F26522; --navy:#1A3A5C; --mid:#2E5F8A;
  --bg:#F4F6F9; --surface:#fff; --border:#E2E8F0;
  --text:#1A3A5C; --muted:#64829A;
  --green:#15803D; --green-bg:#DCFCE7;
  --red:#DC2626; --red-bg:#FEE2E2;
  --purple:#7C3AED; --purple-bg:#EDE9FE;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;}
.back-link{font-size:13px;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:4px;}
.back-link:hover{color:var(--navy);}
.topbar-title{font-family:'Instrument Serif',serif;font-size:18px;}
.score-pill{background:var(--navy);color:white;font-size:13px;font-weight:500;padding:6px 16px;border-radius:20px;}

.game-wrap{max-width:680px;margin:0 auto;padding:32px 24px;display:flex;flex-direction:column;gap:28px;}

/* Header card */
.header-card{background:var(--purple-bg);border:1px solid rgba(124,58,237,0.2);border-radius:16px;padding:24px;text-align:center;}
.header-round{font-size:12px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--purple);margin-bottom:6px;}
.header-title{font-family:'Instrument Serif',serif;font-size:22px;color:var(--navy);margin-bottom:4px;}
.header-sub{font-size:14px;color:var(--muted);}

/* Progress */
.progress-row{display:flex;gap:6px;justify-content:center;}
.prog-dot{width:32px;height:6px;border-radius:3px;background:var(--border);transition:background 0.3s;}
.prog-dot.done-correct{background:var(--green);}
.prog-dot.done-wrong{background:var(--red);}
.prog-dot.current{background:var(--purple);}

/* Timer */
.timer-wrap{display:flex;align-items:center;justify-content:center;gap:12px;}
.timer-track{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden;}
.timer-fill{height:100%;background:var(--purple);border-radius:4px;transition:width 0.1s linear;}
.timer-label{font-size:14px;font-weight:500;color:var(--navy);min-width:28px;text-align:right;}
.timer-fill.warning{background:var(--orange);}
.timer-fill.danger{background:var(--red);}

/* Statement cards */
.statements{display:flex;flex-direction:column;gap:12px;}

.statement-card{
  background:var(--surface);
  border:2px solid var(--border);
  border-radius:14px;padding:20px 24px;
  cursor:pointer;
  transition:all 0.2s;
  display:flex;align-items:flex-start;gap:16px;
  position:relative;overflow:hidden;
}
.statement-card:hover:not(.disabled){border-color:var(--purple);background:#FAFAFE;transform:translateY(-1px);}
.statement-card.selected{border-color:var(--purple);background:var(--purple-bg);}
.statement-card.reveal-lie{border-color:var(--red);background:var(--red-bg);animation:shake 0.4s ease;}
.statement-card.reveal-truth{border-color:var(--green);background:var(--green-bg);}
.statement-card.disabled{cursor:default;}

@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
@keyframes popIn{0%{transform:scale(0.92);opacity:0}100%{transform:scale(1);opacity:1}}

.stmt-badge{
  width:32px;height:32px;border-radius:50%;
  background:var(--bg);border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:600;color:var(--muted);
  flex-shrink:0;transition:all 0.2s;
}
.statement-card.selected .stmt-badge{background:var(--purple);border-color:var(--purple);color:white;}
.statement-card.reveal-lie .stmt-badge{background:var(--red);border-color:var(--red);color:white;}
.statement-card.reveal-truth .stmt-badge{background:var(--green);border-color:var(--green);color:white;}

.stmt-text{font-size:15px;color:var(--text);line-height:1.6;flex:1;}
.stmt-icon{font-size:20px;position:absolute;right:16px;top:50%;transform:translateY(-50%);opacity:0;transition:opacity 0.3s;}
.statement-card.reveal-lie .stmt-icon{opacity:1;}
.statement-card.reveal-truth .stmt-icon{opacity:1;}

/* Explanation */
.explanation{
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  padding:20px 24px;display:none;animation:popIn 0.3s ease;
}
.explanation.show{display:block;}
.exp-label{font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.exp-text{font-size:14px;color:var(--text);line-height:1.6;}
.exp-fact{margin-top:10px;padding:10px 14px;background:var(--bg);border-radius:8px;font-size:13px;color:var(--mid);}

/* Next btn */
.next-wrap{display:flex;justify-content:center;}
.next-btn{background:var(--navy);color:white;border:none;padding:13px 40px;border-radius:50px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;transition:all 0.2s;display:none;}
.next-btn.show{display:block;}
.next-btn:hover{background:var(--mid);}

/* Results */
.results-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px;text-align:center;display:none;flex-direction:column;gap:16px;animation:popIn 0.4s ease;}
.results-card.show{display:flex;}
.results-score{font-family:'Instrument Serif',serif;font-size:56px;color:var(--navy);}
.results-label{font-size:15px;color:var(--muted);}
.results-xp{display:inline-block;background:rgba(242,101,34,0.1);color:var(--orange);font-size:13px;font-weight:500;padding:4px 14px;border-radius:20px;margin-top:4px;}
.play-again-btn{background:var(--orange);color:white;border:none;padding:13px 32px;border-radius:50px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;margin:0 auto;}
.play-again-btn:hover{background:#D4541A;}
</style>
</head>
<body>

<div class="topbar">
  <a class="back-link" href="futureyou_games.html">&#8592; Games</a>
  <div class="topbar-title">Two Truths, One Lie</div>
  <div class="score-pill" id="score-pill">Score: 0</div>
</div>

<div class="game-wrap">
  <div class="header-card">
    <div class="header-round" id="header-round">Round 1 of 6</div>
    <div class="header-title">Which one is the lie?</div>
    <div class="header-sub">Two statements are true NPS facts. One is false. Pick the lie.</div>
  </div>

  <div class="progress-row" id="progress-row"></div>

  <div class="timer-wrap">
    <div class="timer-track"><div class="timer-fill" id="timer-fill"></div></div>
    <div class="timer-label" id="timer-label">15</div>
  </div>

  <div class="statements" id="statements"></div>

  <div class="explanation" id="explanation">
    <div class="exp-label">Explanation</div>
    <div class="exp-text" id="exp-text"></div>
    <div class="exp-fact" id="exp-fact"></div>
  </div>

  <div class="next-wrap">
    <button class="next-btn" id="next-btn" onclick="nextRound()">Next round &#8594;</button>
  </div>

  <div class="results-card" id="results-card">
    <div style="font-size:40px">&#127881;</div>
    <div class="results-score" id="results-score">0 / 6</div>
    <div class="results-label">rounds correct</div>
    <div class="results-xp" id="results-xp">+40 XP earned</div>
    <button class="play-again-btn" onclick="initGame()">Play again</button>
    <a href="futureyou_games.html" style="font-size:13px;color:var(--muted);text-align:center;">Back to games</a>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════
// ROUNDS DATA — lie is always index 2 (shuffled before display)
// ══════════════════════════════════════════════════════════════
const ROUNDS_DATA = [
  {
    statements: [
      { text: 'NPS charges only 0.09% per year in fund management fees — the lowest of any pension product in India.', truth: true },
      { text: 'You can claim an additional ₹50,000 tax deduction under Section 80CCD(1B), over and above the ₹1.5L 80C limit.', truth: true },
      { text: 'NPS contributions are completely tax-free at all stages — including the full corpus at withdrawal.', truth: false },
    ],
    explanation: 'Only 60% of the NPS corpus is tax-free at maturity. The remaining 40% must be used to purchase an annuity, and the annuity income is taxable.',
    fact: '💡 But the 80CCD(1B) benefit of ₹50,000 is real and exclusive to NPS — most people miss it.',
  },
  {
    statements: [
      { text: 'NPS Tier II is a flexible savings account with no lock-in — you can withdraw anytime.', truth: true },
      { text: 'Government employees enjoy a 14% employer contribution to NPS, while private sector gets 10%.', truth: true },
      { text: 'You can withdraw up to 50% of your own NPS contributions after just 1 year of subscription.', truth: false },
    ],
    explanation: 'Partial withdrawal from Tier I is allowed only after 3 years of subscription, and you can withdraw a maximum of 25% of your own contributions — not 50%.',
    fact: '💡 Approved reasons include higher education, marriage, critical illness, and purchasing a home.',
  },
  {
    statements: [
      { text: 'PFRDA (Pension Fund Regulatory and Development Authority) regulates and oversees NPS.', truth: true },
      { text: 'At retirement, you must use at least 40% of your Tier I corpus to purchase an annuity.', truth: true },
      { text: 'NPS is only available to central government employees — private sector workers cannot join.', truth: false },
    ],
    explanation: 'NPS is open to all Indian citizens aged 18–70, including private sector employees, self-employed individuals, and even NRIs under the All Citizen Model.',
    fact: '💡 The All Citizen Model was launched specifically to extend NPS benefits to every working Indian.',
  },
  {
    statements: [
      { text: 'NPS has 4 asset classes: Equity (E), Corporate Bonds (C), Government Securities (G), and Alternative Assets (A).', truth: true },
      { text: 'A PRAN (Permanent Retirement Account Number) is a unique 12-digit number assigned to every NPS subscriber.', truth: true },
      { text: 'In the Auto Choice (Lifecycle Fund), your equity allocation increases as you get older.', truth: false },
    ],
    explanation: 'In Auto Choice, equity allocation actually decreases as you age — it starts high (up to 75%) when you\'re young and gradually reduces to protect your corpus as retirement approaches.',
    fact: '💡 This is the opposite of aggressive investing — NPS auto-manages risk for you over time.',
  },
  {
    statements: [
      { text: 'Self-employed individuals can claim up to 20% of their gross income as NPS deduction under 80CCD(1).', truth: true },
      { text: 'Premature exit from NPS before age 60 requires using at least 80% of the corpus to buy an annuity.', truth: true },
      { text: 'NPS guarantees a fixed minimum return of 8% per year, making it low-risk.', truth: false },
    ],
    explanation: 'NPS does not guarantee any fixed return. Returns depend on market performance across asset classes. Equity-heavy portfolios can earn higher returns but with more risk.',
    fact: '💡 Historically, NPS equity funds have delivered 10-12% CAGR, but past performance is not a guarantee.',
  },
  {
    statements: [
      { text: 'There are 8 registered Pension Fund Managers (PFMs) that manage NPS money, including LIC, SBI, and HDFC.', truth: true },
      { text: 'The normal exit age for NPS is 60. You can defer withdrawal up to age 75.', truth: true },
      { text: 'NPS Tier I accounts can be closed at any time with a full tax-free withdrawal.', truth: false },
    ],
    explanation: 'Tier I is a long-term pension account with strict lock-in. Full exit before 60 is considered premature and requires 80% annuitisation. There is no "anytime full tax-free" closure.',
    fact: '💡 Tier II has no lock-in and can be closed freely — it\'s designed for flexibility alongside the locked Tier I.',
  },
];

let rounds = [];
let currentRound = 0;
let score = 0;
let timer = null;
let timeLeft = 15;
let answered = false;
const TOTAL_ROUNDS = 6;
const TIME_PER_ROUND = 15;

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function initGame() {
  rounds = shuffle(ROUNDS_DATA).slice(0, TOTAL_ROUNDS).map(r => ({
    ...r, statements: shuffle(r.statements)
  }));
  currentRound = 0; score = 0; answered = false;
  document.getElementById('results-card').className = 'results-card';
  document.getElementById('score-pill').textContent = 'Score: 0';
  buildProgressDots();
  showRound();
}

function buildProgressDots() {
  const row = document.getElementById('progress-row');
  row.innerHTML = '';
  for (let i = 0; i < TOTAL_ROUNDS; i++) {
    const d = document.createElement('div');
    d.className = 'prog-dot' + (i === 0 ? ' current' : '');
    d.id = `pdot-${i}`;
    row.appendChild(d);
  }
}

function showRound() {
  answered = false;
  const r = rounds[currentRound];
  document.getElementById('header-round').textContent = `Round ${currentRound+1} of ${TOTAL_ROUNDS}`;
  document.getElementById('explanation').className = 'explanation';
  document.getElementById('next-btn').className = 'next-btn';

  const stmts = document.getElementById('statements');
  stmts.innerHTML = '';
  r.statements.forEach((s, i) => {
    const card = document.createElement('div');
    card.className = 'statement-card';
    card.style.animationDelay = (i * 0.08) + 's';
    card.style.animation = 'popIn 0.3s ease both';
    card.style.animationDelay = (i * 0.1) + 's';
    card.innerHTML = `
      <div class="stmt-badge">${String.fromCharCode(65+i)}</div>
      <div class="stmt-text">${s.text}</div>
      <div class="stmt-icon">${s.truth ? '✓' : '✗'}</div>
    `;
    card.onclick = () => handleChoice(i, s.truth, card);
    stmts.appendChild(card);
  });

  startTimer();
}

function startTimer() {
  clearInterval(timer);
  timeLeft = TIME_PER_ROUND;
  updateTimerUI();
  timer = setInterval(() => {
    timeLeft--;
    updateTimerUI();
    if (timeLeft <= 0) { clearInterval(timer); timeExpired(); }
  }, 1000);
}

function updateTimerUI() {
  const pct = (timeLeft / TIME_PER_ROUND) * 100;
  const fill = document.getElementById('timer-fill');
  fill.style.width = pct + '%';
  fill.className = 'timer-fill' + (timeLeft <= 5 ? ' danger' : timeLeft <= 8 ? ' warning' : '');
  document.getElementById('timer-label').textContent = timeLeft;
}

function timeExpired() {
  if (answered) return;
  answered = true;
  revealAll(null);
  document.getElementById('exp-text').textContent = '⏱ Time\'s up! ' + rounds[currentRound].explanation;
  document.getElementById('exp-fact').textContent = rounds[currentRound].fact;
  document.getElementById('explanation').className = 'explanation show';
  document.getElementById('next-btn').className = 'next-btn show';
}

function handleChoice(idx, isTruth, card) {
  if (answered) return;
  answered = true;
  clearInterval(timer);

  card.classList.add('selected');
  const choseLie = !isTruth;

  setTimeout(() => {
    revealAll(idx);
    if (choseLie) {
      score++;
      document.getElementById('score-pill').textContent = `Score: ${score}`;
      document.getElementById(`pdot-${currentRound}`).className = 'prog-dot done-correct';
    } else {
      document.getElementById(`pdot-${currentRound}`).className = 'prog-dot done-wrong';
    }
    document.getElementById('exp-text').textContent = (choseLie ? '✅ Correct! ' : '❌ Wrong! ') + rounds[currentRound].explanation;
    document.getElementById('exp-fact').textContent = rounds[currentRound].fact;
    document.getElementById('explanation').className = 'explanation show';
    document.getElementById('next-btn').className = 'next-btn show';
    if (currentRound === TOTAL_ROUNDS - 1) document.getElementById('next-btn').textContent = 'See results';
  }, 200);
}

function revealAll(chosenIdx) {
  const cards = document.getElementById('statements').querySelectorAll('.statement-card');
  rounds[currentRound].statements.forEach((s, i) => {
    cards[i].classList.add('disabled');
    if (!s.truth) cards[i].classList.add('reveal-lie');
    else cards[i].classList.add('reveal-truth');
  });
}

function nextRound() {
  currentRound++;
  if (currentRound >= TOTAL_ROUNDS) { showResults(); return; }
  if (currentRound < TOTAL_ROUNDS) {
    document.getElementById(`pdot-${currentRound}`).className = 'prog-dot current';
  }
  showRound();
}

function showResults() {
  clearInterval(timer);
  document.getElementById('statements').innerHTML = '';
  document.getElementById('explanation').className = 'explanation';
  document.getElementById('next-btn').className = 'next-btn';
  document.getElementById('timer-fill').style.width = '0%';
  const xp = Math.round((score / TOTAL_ROUNDS) * 40);
  document.getElementById('results-score').textContent = `${score} / ${TOTAL_ROUNDS}`;
  document.getElementById('results-xp').textContent = `+${xp} XP earned`;
  document.getElementById('results-card').className = 'results-card show';
}

initGame();
</script>
</body>
</html>
